services:
  # ── Middleware ──
  mongo:
    image: mongo:7
    container_name: night-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-night}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-nightpass}
      MONGO_INITDB_DATABASE: agent_night
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: night-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-nightredis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nightredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ──
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: night-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      MONGODB_URL: mongodb://${MONGO_USER:-night}:${MONGO_PASSWORD:-nightpass}@mongo:27017/agent_night?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-nightredis}@redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ──
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: night-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      VITE_API_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
